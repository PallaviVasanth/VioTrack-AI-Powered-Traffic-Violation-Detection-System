<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Analytics Chart – Smart Violation Management</title>

    <!-- Bootstrap -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

    <!-- Icons -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

    
    <style>
        body {
            background: linear-gradient(135deg, #0a0f24, #182b49);
            color: white;
            font-family: 'Poppins', sans-serif;
            padding-bottom: 40px;
        }

        .graph-container {
            max-width: 950px;
            margin: 70px auto;
            padding: 30px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 22px;
            backdrop-filter: blur(6px);
            text-align: center;
            box-shadow: 0 0 25px rgba(255, 255, 255, 0.12);
        }

        .chart-box {
            margin-top: 25px;
            background: rgba(255, 255, 255, 0.15);
            padding: 18px;
            border-radius: 18px;
            border: 2px solid rgba(255, 255, 255, 0.18);
        }

        img {
            width: 100%;
            max-height: 600px;
            object-fit: contain;
            border-radius: 12px;
        }

        .btn-back {
            background: #0d6efd;
            padding: 12px 26px;
            font-weight: 600;
            border-radius: 12px;
            border: none;
            margin-top: 25px;
            font-size: 1.1rem;
        }

        .btn-back:hover {
            background: #1b7bff;
        }
    </style>
</head>

<body>

<div class="graph-container">

    <h2><i class="bi bi-graph-up"></i> Analytics Chart</h2>
    <p style="opacity: 0.85;">Visual insights generated from real-time violation data</p>

    <div class="chart-box">
        <img src="data:image/png;base64,{{ graph }}" alt="Generated Chart">
    </div>

    <a href="/analysis">
        <button class="btn-back"><i class="bi bi-arrow-left"></i> Back</button>
    </a>

</div>

</body>

</html>
