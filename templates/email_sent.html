<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Sent – Smart Violation Management</title>

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">      <link rel="stylesheet" href="{{ url_for('static', filename='styles/main.css') }}">

    <style>
        body {
            background: linear-gradient(135deg, #0a0f24, #182b49);
            font-family: 'Poppins', sans-serif;
            color: white;
        }
        .box {
            margin-top: 120px;
            background: rgba(255, 255, 255, 0.1);
            padding: 35px;
            border-radius: 18px;
            text-align: center;
        }
        .btn-home {
            margin-top: 20px;
            padding: 10px 20px;
            border-radius: 12px;
        }
    </style>
</head>

<body>

<div class="container">
    <div class="col-md-6 offset-md-3 box">

        <h2 class="text-success">
            <i class="bi bi-check-circle-fill"></i> Payment Link Sent!
        </h2>

        <p class="mt-3">
            A payment link has been successfully sent to:
        </p>

        <h4 class="text-info">{{ email }}</h4>

        <p class="mt-3">
            Ask the user to check their inbox or spam folder.
        </p>

        <a href="/home" class="btn btn-primary btn-home">
            Back to Dashboard
        </a>

    </div>
</div>

</body>
</html>
