<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Upload – Smart Violation Management</title>

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

    <style>
        body {
            background: radial-gradient(circle at top, #0a1733, #040812 80%);
            color: #fff;
            font-family: 'Poppins', sans-serif;
            padding-top: 40px;
            overflow-x: hidden;
        }

        /* Floating subtle lights */
        .orb {
            position: absolute;
            width: 260px;
            height: 260px;
            background: rgba(0, 140, 255, 0.08);
            filter: blur(70px);
            border-radius: 50%;
            top: 10%;
            left: 5%;
            animation: float 7s infinite alternate ease-in-out;
        }
        .orb2 {
            position: absolute;
            width: 200px;
            height: 200px;
            background: rgba(0, 255, 180, 0.08);
            filter: blur(70px);
            border-radius: 50%;
            bottom: 8%;
            right: 8%;
            animation: float 6s infinite alternate ease-in-out;
            animation-delay: 2s;
        }

        @keyframes float {
            0% { transform: translateY(-20px); }
            100% { transform: translateY(20px); }
        }

        .upload-container {
            max-width: 680px;
            margin: 40px auto;
            padding: 40px;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 20px;
            text-align: center;
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: 0.35s ease;
            position: relative;
            z-index: 10;
        }

        /* Hover highlight */
        .upload-container:hover {
            border: 1px solid rgba(0, 140, 255, 0.4);
            box-shadow: 0 0 28px rgba(0, 140, 255, 0.25);
            transform: translateY(-5px);
        }

        .upload-container h2 {
            font-weight: 600;
        }

        .upload-box {
            border: 2px dashed rgba(255,255,255,0.35);
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 25px;
            background: rgba(255, 255, 255, 0.04);
            transition: 0.3s ease;
        }

        .upload-box:hover {
            background: rgba(255,255,255,0.10);
            border-color: rgba(0, 140, 255, 0.6);
            box-shadow: 0 0 20px rgba(0, 140, 255, 0.2);
        }

        .form-control {
            background: rgba(255,255,255,0.12);
            border: none;
            color: #fff;
            padding: 10px;
            border-radius: 10px;
            transition: 0.25s;
        }

        .form-control:focus {
            background: rgba(255,255,255,0.18);
            box-shadow: 0 0 12px rgba(0, 140, 255, 0.4);
            color: #fff;
        }

        .btn-upload {
            background: #0d6efd;
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: none;
            font-size: 1.05rem;
            font-weight: 600;
            transition: 0.3s ease;
        }

        .btn-upload:hover {
            background: #1b7bff;
            transform: scale(1.03);
            box-shadow: 0 0 20px rgba(0, 140, 255, 0.5);
        }

        a.back-link {
            margin-top: 20px;
            display: inline-block;
            color: #9fc2ff;
            text-decoration: none;
            transition: 0.3s;
        }

        a.back-link:hover {
            color: #cfe3ff;
            text-shadow: 0 0 8px rgba(150,200,255,0.6);
        }
    </style>

    <!-- FIXED VALIDATION SCRIPT -->
    <script>
    function validateUpload() {
        let dropdown = document.querySelector("select[name='existing_file']").value;
        let file = document.getElementById("imageInput").value;

        if (!dropdown && !file) {
            alert("Please select an existing image or upload a new one.");
            return false;
        }
        return true;
    }
    </script>

</head>

<body>

<!-- Subtle background lighting -->
<div class="orb"></div>
<div class="orb orb2"></div>

<div class="upload-container">

    <h2><i class="bi bi-cloud-upload"></i> Upload Image</h2>
    <p style="opacity: 0.8;">Upload a new image or select an existing one</p>

    <form method="POST" enctype="multipart/form-data" onsubmit="return validateUpload()">

        <!-- Dropdown -->
        <label class="mb-2">Select Existing Image</label>
        <select name="existing_file" class="form-control mb-4">
            <option value="">-- Choose from saved images --</option>
            {% for folder, file in available %}
                <option value="{{ file }}">{{ file }} ({{ folder }})</option>
            {% endfor %}
        </select>

        <!-- Upload -->
        <div class="upload-box">
            <i class="bi bi-image" style="font-size: 3rem;"></i>
            <p class="mt-2">Or upload a new image</p>
            <input type="file" id="imageInput" name="image" class="form-control mt-2">
        </div>

        <button type="submit" class="btn-upload">Process Image</button>
    </form>

    <a href="/home" class="back-link"><i class="bi bi-arrow-left"></i> Back to Dashboard</a>

</div>

</body>
</html>
