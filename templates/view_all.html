<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>All Violations – Smart Violation Management</title>

    <!-- Bootstrap -->
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

    <!-- Icons -->
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

    <link rel="stylesheet" href="{{ url_for('static', filename='styles/main.css') }}">

    <style>
        body {
            background: linear-gradient(135deg, #0a0f24, #182b49);
            color: #fff;
            font-family: 'Poppins', sans-serif;
        }

        .page-title {
            margin-top: 40px;
            font-size: 2rem;
            font-weight: 600;
            text-align: center;
        }

        .table-container {
            margin-top: 40px;
            background: rgba(255, 255, 255, 0.08);
            padding: 25px;
            border-radius: 20px;
            backdrop-filter: blur(6px);
        }

        table {
            background: white;
            color: #000;
            border-radius: 12px;
            overflow: hidden;
        }

        thead {
            background: #182b49;
            color: white;
        }

        table tbody tr:hover {
            background: rgba(0, 0, 0, 0.06);
        }

        .btn-back {
            margin-top: 25px;
            margin-bottom: 20px;
            background: #0d6efd;
            color: white;
            padding: 10px 20px;
            border-radius: 10px;
            border: none;
            transition: 0.3s;
        }

        .btn-back:hover {
            background: #1b7bff;
        }
    </style>
</head>

<body>

    <div class="container">

        <h2 class="page-title"><i class="bi bi-card-list"></i> All Violations</h2>

        <div class="table-container">
            <div class="table-responsive">

                <table class="table table-dark table-striped">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Vehicle Number</th>
                            <th>Violation</th>
                            <th>Fine</th>
                            <th>Date</th>
                            <th>View</th>
                        </tr>
                    </thead>

                    <tbody>
                        {% for row in data %}
                        <tr>
                            <!-- AUTO INDEX (REAL VIEW ID) -->
                            <td>{{ loop.index0 }}</td>

                            <td>{{ row.vehicle_number }}</td>
                            <td>{{ row.violation }}</td>
                            <td>{{ row.fine_amount }}</td>
                            <td>{{ row.date_of_violation }}</td>

                            <td>
                                <a href="/view_violation/{{ loop.index0 }}" class="btn btn-primary btn-sm">
                                    View
                                </a>
                            </td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>

            </div>
        </div>

        <div class="text-center">
            <a href="/home">
                <button class="btn-back">
                    <i class="bi bi-arrow-left"></i> Back to Dashboard
                </button>
            </a>
        </div>

    </div>

</body>

</html>
