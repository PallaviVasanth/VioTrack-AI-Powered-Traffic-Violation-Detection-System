<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login – Smart Violation Management</title>

    <!-- Bootstrap -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

    <!-- Icons -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

    <style>
        body {
            background: radial-gradient(circle at top, #0a1733, #040812 80%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Poppins', sans-serif;
            color: #fff;
            overflow: hidden;
        }

        .orb {
            position: absolute;
            width: 250px;
            height: 250px;
            background: rgba(0, 140, 255, 0.08);
            filter: blur(70px);
            border-radius: 50%;
            top: 15%;
            left: 10%;
            animation: float 6s infinite alternate ease-in-out;
        }

        .orb2 {
            width: 200px;
            height: 200px;
            background: rgba(0, 255, 150, 0.08);
            bottom: 10%;
            right: 12%;
            animation-delay: 2s;
        }

        @keyframes float {
            0% { transform: translateY(-20px); }
            100% { transform: translateY(20px); }
        }

        .login-card {
            width: 380px;
            background: rgba(255, 255, 255, 0.06);
            padding: 40px;
            border-radius: 18px;
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            text-align: center;
            transition: 0.35s ease;
        }

        .login-card:hover {
            border: 1px solid rgba(0, 140, 255, 0.4);
            box-shadow: 0 0 25px rgba(0, 140, 255, 0.25);
            transform: translateY(-6px);
        }

        .form-control {
            background: rgba(255, 255, 255, 0.12);
            border: none;
            color: #fff;
            padding: 12px;
            border-radius: 10px;
            transition: 0.25s ease;
        }

        .form-control:focus {
            background: rgba(255, 255, 255, 0.18);
            box-shadow: 0 0 12px rgba(0, 140, 255, 0.4);
            color: #fff;
        }

        .btn-login {
            width: 100%;
            background: #0d6efd;
            border: none;
            padding: 12px;
            border-radius: 10px;
            font-weight: 600;
            margin-top: 15px;
            transition: 0.3s ease;
        }

        .btn-login:hover {
            background: #1b7bff;
            box-shadow: 0 0 15px rgba(0, 140, 255, 0.5);
            transform: scale(1.03);
        }

        .title-section {
            text-align: center;
            margin-bottom: 25px;
        }

        .logo-container svg {
            width: 85px;
            height: 85px;
            margin-bottom: 10px;
            filter: drop-shadow(0 0 8px rgba(13,110,253,0.4));
        }

    </style>
</head>

<body>

<div class="orb"></div>
<div class="orb orb2"></div>

<div class="page-center">

    <div class="title-section">

        <!-- Project Logo (Same style as PDF but NO text) -->
        <div class="logo-container">
            <svg viewBox="0 0 100 100" fill="none">
                <!-- Outer Dark Blue Circle -->
                <circle cx="50" cy="50" r="48" fill="#002060"/>

                <!-- Inner White Circle -->
                <circle cx="50" cy="50" r="40" fill="white"/>

                <!-- Shield Body -->
                <path d="M35 40 L65 40 L50 70 Z" fill="#002060"/>

                <!-- Three Vertical Bars (Traffic Indicator Style) -->
                <rect x="44" y="45" width="4" height="15" fill="#002060"/>
                <rect x="50" y="45" width="4" height="15" fill="#002060"/>
                <rect x="56" y="45" width="4" height="15" fill="#002060"/>
            </svg>
        </div>

        <h1 style="
            font-size:2rem;
            font-weight:700;
            color:#0d6efd;
            text-shadow:0 0 8px rgba(13,110,253,0.4);
        ">
            VioTrack
        </h1>

        <p style="opacity:0.8; font-size: 0.95rem;">
            A Deep Learning Approach for Violation Detection, Identity Extraction,<br>
            and Digital Fine Management
        </p>

    </div>

    <div class="login-card">
        <i class="bi bi-shield-lock" style="font-size: 3rem; margin-bottom: 10px; opacity:0.85;"></i>

        <h2 style="font-weight:600;">Welcome Back</h2>
        <p style="opacity:0.7;">Login to continue</p>

        <form method="POST">
            <input type="text" name="username" class="form-control mb-3" placeholder="Username" required>
            <input type="password" name="password" class="form-control mb-3" placeholder="Password" required>

            <button type="submit" class="btn-login">Login</button>
        </form>
    </div>

</div>

</body>
</html>
