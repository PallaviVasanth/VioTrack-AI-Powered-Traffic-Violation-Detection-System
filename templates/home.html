<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Smart Violation Management</title>

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0a0f24, #182b49);
            color: white;
            overflow-x: hidden;
        }

        .page-container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding-bottom: 40px;
        }

        h1 {
            font-weight: 700;
            animation: fadeDown 1s ease-out;
        }

        .subtitle {
            font-size: 1.1rem;
            opacity: 0.8;
            animation: fadeDown 1.3s ease-out;
        }

        /* CARD STYLE (Matches your screenshot) */
        .feature-card {
            background: rgba(255,255,255,0.06);
            border-radius: 22px;
            padding: 40px 20px;
            width: 360px;
            height: 240px;
            text-align: center;
            color: white;
            margin: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.15);
            transition: 0.3s ease-in-out;
        }

        /* Hover glow + lift */
        .feature-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 8px 30px rgba(0, 170, 255, 0.35);
            border-color: rgba(0, 180, 255, 0.6);
        }

        /* Icon Glow (Your screenshot style) */
        .feature-card i {
            font-size: 3.8rem;
            color: #4db8ff;
            text-shadow: 0 0 12px rgba(0,150,255,0.9);
            margin-bottom: 15px;
        }

        .feature-card h3 {
            font-weight: 600;
            margin-top: 10px;
        }

        .feature-card p {
            opacity: 0.85;
            margin-top: 10px;
        }

        @keyframes fadeDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>

<body>

<div class="page-container">

    <h1 class="mb-2">Smart Violation Management</h1>
    <p class="subtitle mb-5">AI-Powered Traffic Violation Detection System</p>

    <div class="row justify-content-center">

        <!-- CARD 1 -->
        <div class="col-md-4 d-flex justify-content-center">
            <a href="/upload" style="text-decoration: none; color: inherit;">
                <div class="feature-card">
                    <i class="bi bi-cloud-upload"></i>
                    <h3>Upload Image</h3>
                    <p>Process images for violation detection</p>
                </div>
            </a>
        </div>

        <!-- CARD 2 -->
        <div class="col-md-4 d-flex justify-content-center">
            <a href="/view_all" style="text-decoration: none; color: inherit;">
                <div class="feature-card">
                    <i class="bi bi-card-list"></i>
                    <h3>View Violations</h3>
                    <p>Browse all stored detection records</p>
                </div>
            </a>
        </div>

        <!-- CARD 3 -->
        <div class="col-md-4 d-flex justify-content-center">
            <a href="/analysis" style="text-decoration: none; color: inherit;">
                <div class="feature-card">
                    <i class="bi bi-bar-chart-line"></i>
                    <h3>Analytics</h3>
                    <p>Visual insights & violation statistics</p>
                </div>
            </a>
        </div>

    </div>
</div>

</body>
</html>
